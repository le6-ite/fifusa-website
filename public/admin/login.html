<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — FIFUSA • UEFS</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="icon" type="image/png" href="/images/fifusa_logo.png">
</head>
<body class="admin-body" style="display:block;">

<div class="login-page">
  <div class="login-card">
    <div class="login-logos">
      <img src="/images/uefs_logo.png" alt="UEFS">
      <img src="/images/fifusa_logo.png" alt="FIFUSA">
    </div>
    <h2>ADMIN PANEL</h2>
    <p>FIFUSA • UEFS Management</p>

    <div id="loginAlert" class="alert"></div>

    <form id="loginForm">
      <div class="form-group" style="text-align:left;">
        <label class="form-label" for="username">Логин</label>
        <input type="text" id="username" class="form-control" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-group" style="text-align:left;">
        <label class="form-label" for="password">Пароль</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;" id="loginBtn">
        ВОЙТИ
      </button>
    </form>
    <div style="margin-top:1.5rem;">
      <a href="/" style="font-size:0.85rem;color:var(--color-text-muted);">← Вернуться на сайт</a>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('fifusa-token')) {
    window.location.href = '/admin/';
  }

  const form = document.getElementById('loginForm');
  const alert = document.getElementById('loginAlert');
  const btn = document.getElementById('loginBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'ВХОД...';
    alert.className = 'alert';
    alert.textContent = '';

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        alert.className = 'alert alert-error show';
        alert.textContent = data.error || 'Неверный логин или пароль';
        btn.disabled = false;
        btn.textContent = 'ВОЙТИ';
        return;
      }

      localStorage.setItem('fifusa-token', data.token);
      localStorage.setItem('fifusa-admin-user', data.username);
      window.location.href = '/admin/';
    } catch (err) {
      alert.className = 'alert alert-error show';
      alert.textContent = 'Ошибка соединения с сервером';
      btn.disabled = false;
      btn.textContent = 'ВОЙТИ';
    }
  });
</script>
</body>
</html>
