<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Документы — FIFUSA • UEFS</title>
  <meta name="description" content="Регламенты и официальные документы FIFUSA и UEFS.">
  <link rel="icon" type="image/png" href="/images/fifusa_logo.png">
  <link rel="stylesheet" href="/css/redesign.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="/" class="navbar-brand">FIFUSA <span class="dot">•</span> UEFS</a>
  <div id="navMenu">
    <a href="/" class="nav-link" data-i18n="nav.home">ГЛАВНАЯ</a>
    <a href="/about.html" class="nav-link" data-i18n="nav.about">О НАС</a>
    <a href="/documents.html" class="nav-link active" data-i18n="nav.documents">РЕГЛАМЕНТ</a>
    <a href="/news.html" class="nav-link" data-i18n="nav.news">НОВОСТИ</a>
    <a href="/media.html" class="nav-link" data-i18n="nav.media">МЕДИА</a>
    <a href="/partners.html" class="nav-link" data-i18n="nav.partners">ПАРТНЁРЫ</a>
    <a href="/contact.html" class="nav-link" data-i18n="nav.contact">КОНТАКТ</a>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
  </div>
  <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="page-header">
  <div class="section-label">// FIFUSA • UEFS</div>
  <h1 data-i18n="docs.page_title">РЕГЛАМЕНТ</h1>
  <p class="page-header-note" data-i18n="docs.page_note">Официальные документы, правила игры и регламенты. Файлы загружаются через админ-панель.</p>
</div>

<div class="section" style="padding-top:0;">
  <div id="docsList">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<footer>
  <div class="footer-banner">
    <img src="/images/adverisement_banner_in_footer.png" alt="Banner">
  </div>
  <div class="footer-bottom">
    <span>© 2026 FIFUSA • UEFS</span>
    <div class="footer-links">
      <a href="/about.html" data-i18n="nav.about">О НАС</a>
      <a href="/documents.html" data-i18n="nav.documents">РЕГЛАМЕНТ</a>
      <a href="/partners.html" data-i18n="nav.partners">ПАРТНЁРЫ</a>
      <a href="/news.html" data-i18n="nav.news">НОВОСТИ</a>
      <a href="/media.html" data-i18n="nav.media">МЕДИА</a>
    </div>
  </div>
</footer>

<script src="/js/main.js"></script>
<script>
  async function loadDocs() {
    const list = document.getElementById('docsList');
    try {
      const data = await FIFUSA.apiFetch('/api/documents');
      const docs = Array.isArray(data) ? data : (data.items || []);
      const lang = FIFUSA.getCurrentLang();

      if (docs.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <div class="empty-icon">📄</div>
          <p data-i18n="docs.empty">Документов пока нет</p>
        </div>`;
        return;
      }

      list.innerHTML = docs.map(d => {
        const title = d['title_'+lang] || d.title_ru || d.original_name || 'Документ';
        const hint = d.category ? d.category.toUpperCase() : 'PDF';
        return `<div class="doc-item reveal">
          <div class="doc-icon-box">PDF</div>
          <div class="doc-info">
            <div class="doc-title">${title}</div>
            <div class="doc-hint">${hint} · ${FIFUSA.formatDate(d.created_at)}</div>
          </div>
          ${d.file_path
            ? `<a href="${d.file_path}" download class="doc-download-link" data-i18n="docs.download">СКАЧАТЬ ↓</a>`
            : `<span class="doc-download-link" style="opacity:.4;" data-i18n="docs.no_file">НЕТ ФАЙЛА</span>`}
        </div>`;
      }).join('');

      FIFUSA.observeNewRevealElements();
    } catch(e) {
      list.innerHTML = `<div class="empty-state"><p>Не удалось загрузить документы</p></div>`;
    }
  }

  document.addEventListener('DOMContentLoaded', loadDocs);
  document.addEventListener('fifusa:langchange', loadDocs);
</script>
</body>
</html>
