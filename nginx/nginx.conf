events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=contact:10m rate=1r/m;

  # HTTP — redirect to HTTPS (or serve directly during dev)
  server {
    listen 80;
    server_name uefs-fifusa.org www.uefs-fifusa.org;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl;
    server_name uefs-fifusa.org www.uefs-fifusa.org;

    ssl_certificate     /etc/letsencrypt/live/uefs-fifusa.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uefs-fifusa.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Upload size limit (for images/PDFs)
    client_max_body_size 25M;

    # Rate limit contact form
    location /api/contact {
      limit_req zone=contact burst=3 nodelay;
      proxy_pass http://app:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Rate limit other API routes
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://app:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # All other traffic
    location / {
      proxy_pass http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
