services:
  app:
    build: .
    container_name: fifusa-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    networks:
      - fifusa-net
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: fifusa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - fifusa-net

  certbot:
    image: certbot/certbot
    container_name: fifusa-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  fifusa-net:
    driver: bridge
